<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lovies Study Guide</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .screen {
            display: none;
        }

#importScreen input,
#importScreen textarea {
    width: 70%;
    max-width: 600px;
    padding: 12px;
    margin: 8px;
    font-size: 18px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

#importScreen textarea {
    height: 100px;
}

#importScreen button {
    font-size: 18px;
    padding: 12px 24px;
    margin: 10px;
}

        #homeScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #homeScreen img {
            width: 700px;
            max-width: 90vw;
            height: auto;
            display: block;
            margin: 0 auto 20px auto;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        #quizScreen {
            background-image: url("quiz.jpg");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            padding: 20px;
        }

        #importScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: url("import.jpg");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            padding: 20px;
        }

       #importTitle {
            background: rgba(255,255,255,0.9);
            padding: 12px 25px;
            border-radius: 12px;
            border: 2px solid #ccc;
            font-size: 24px;
            display: inline-block;
            margin-top: 80px;
            margin-bottom: 20px;
        }

        #choices {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #choices button {
            width: 300px;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        #choices button:hover {
            background-color: #2980b9;
        }


        #question,
        #startButton,
        #newQuestionsButton,
        #importButton,
        #backHomeButton,
        #nextButton {
            padding: 12px 20px;
            font-size: 18px;
            cursor: pointer;
            background: rgba(255,255,255,0.9);
            border-radius: 10px;
            margin-top:15px;
        }

        #result,
        #explanation,
        #score {
            background: rgba(255,255,255,0.85);
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
            margin: 10px 0;
        }


        textarea {
            width: 80%;
            max-width: 900px;
            background: rgba(255,255,255,0.85);
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1 id="title" style="cursor: pointer;">Lovies Study Guide</h1>

    <div id="homeScreen" class="screen">
        <button id="startButton">Start Quiz</button>
        <button id="newQuestionsButton">New Questions</button>
        <img src="image.jpg" alt="Homepage image">
    </div>

    <div id="quizScreen" class="screen">
        <h2 id="question"></h2>
        <div id="choices"></div>
        <p id="result"></p>
        <p id="explanation"></p>
        <p id="score"></p>
        <button id="nextButton" style="display: none;">Next Question</button>
    </div>

  <div id="importScreen" class="screen">
    <h2 id="importTitle">Add Question</h2>

    <input id="newQuestion" placeholder="Question">
    <br><br>

    <input id="choiceA" placeholder="Answer A">
    <br><br>

    <input id="choiceB" placeholder="Answer B">
    <br><br>

    <input id="choiceC" placeholder="Answer C">
    <br><br>

    <input id="choiceD" placeholder="Answer D">
    <br><br>

    <input id="correctAnswer" placeholder="Correct Answer (A, B, C, or D)">
    <br><br>

    <textarea id="newExplanation" placeholder="Explanation"></textarea>
    <br><br>

    <button id="addQuestionButton">Add Question</button>
    <br><br>

    <button id="backHomeButton">Back to Home</button>

    <p id="importMessage"></p>
</div>
    <script>
        let defaultQuestions = [
            {
                question: "How much does my boyfriend love me?",
                choices: [
                    "A. Not at all",
                    "B. Just a little bit",
                    "C. A lot",
                    "D. My boyfriend loves me so much that it is not even possible to quantify because it is too much for human comprehension."
                ],
                answer: "D",
                explanation: "I love you so so so so so so so much, all the time, in every way, forever and ever."
            }
        ];

        let savedQuestions;
        try {
            savedQuestions = JSON.parse(localStorage.getItem("nasmQuestions"));
        } catch (e) {
            savedQuestions = null;
        }

        let questions = Array.isArray(savedQuestions) && savedQuestions.length > 0
            ? savedQuestions
            : defaultQuestions;

        let currentQuestion = 0;
        let score = 0;

        const homeScreen = document.getElementById("homeScreen");
        const quizScreen = document.getElementById("quizScreen");
        const importScreen = document.getElementById("importScreen");

        const title = document.getElementById("title");
        const startButton = document.getElementById("startButton");
        const newQuestionsButton = document.getElementById("newQuestionsButton");
        const backHomeButton = document.getElementById("backHomeButton");
        const nextButton = document.getElementById("nextButton");
        const importButton = document.getElementById("importButton");

        const questionEl = document.getElementById("question");
        const choicesEl = document.getElementById("choices");
        const resultEl = document.getElementById("result");
        const explanationEl = document.getElementById("explanation");
        const scoreEl = document.getElementById("score");
        const newQuestion = document.getElementById("newQuestion");
        const choiceA = document.getElementById("choiceA");
        const choiceB = document.getElementById("choiceB");
        const choiceC = document.getElementById("choiceC");
        const choiceD = document.getElementById("choiceD");
        const correctAnswer = document.getElementById("correctAnswer");
        const newExplanation = document.getElementById("newExplanation");
        const addQuestionButton = document.getElementById("addQuestionButton");

        function saveQuestions() {
            localStorage.setItem("nasmQuestions", JSON.stringify(questions));
        }

        function showHome() {
            homeScreen.style.display = "flex";
            quizScreen.style.display = "none";
            importScreen.style.display = "none";
            resultEl.textContent = "";
            explanationEl.textContent = "";
        }

        function showQuiz() {
            homeScreen.style.display = "none";
            quizScreen.style.display = "block";
            importScreen.style.display = "none";
        }

        function showImport() {
            homeScreen.style.display = "none";
            quizScreen.style.display = "none";
            importScreen.style.display = "block";
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            questionEl.textContent = q.question;
            choicesEl.innerHTML = "";
            resultEl.textContent = "";
            explanationEl.textContent = "";
            nextButton.style.display = "none";

        const shuffledChoices = [...q.choices].sort(() => Math.random() - 0.5);

            shuffledChoices.forEach(choiceText => {
                const button = document.createElement("button");
                button.textContent = choiceText;
                button.onclick = function() {
                    checkAnswer(choiceText.charAt(0));
                };
                choicesEl.appendChild(button);
        });
            scoreEl.textContent = "Score: " + score + " / " + questions.length;
        }

        function checkAnswer(userAnswer) {
            const q = questions[currentQuestion];
            const allButtons = choicesEl.querySelectorAll("button");

            allButtons.forEach(button => {
                button.disabled = true;
                const letter = button.textContent.charAt(0);

                if (letter === q.answer) {
                    button.style.backgroundColor = "green";
                }

                if (letter === userAnswer && letter !== q.answer) {
                    button.style.backgroundColor = "red";
                }
            });

            if (userAnswer === q.answer) {
                resultEl.textContent = "Correct!";
                score++;
            } else {
                resultEl.textContent = "Incorrect. Correct answer: " + q.answer;
            }

            explanationEl.textContent = q.explanation;
            nextButton.style.display = "inline-block";
            scoreEl.textContent = "Score: " + score + " / " + questions.length;
        }

        title.onclick = function() {
            showHome();
        };

        startButton.onclick = function() {
            currentQuestion = 0;
            score = 0;
            questions.sort(() => Math.random() - 0.5);
            showQuiz();
            showQuestion();
        };

        newQuestionsButton.onclick = function() {
            showImport();
        };

        backHomeButton.onclick = function() {
            showHome();
        };

        nextButton.onclick = function() {
            currentQuestion++;

            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                questionEl.textContent = "Quiz Finished!";
                choicesEl.innerHTML = "";
                resultEl.textContent = "";
                explanationEl.textContent = "Final score: " + score + " / " + questions.length;
                nextButton.style.display = "none";
            }
        };

addQuestionButton.onclick = function() {

    const questionObj = {
        question: newQuestion.value,
        choices: [
            "A. " + choiceA.value,
            "B. " + choiceB.value,
            "C. " + choiceC.value,
            "D. " + choiceD.value
        ],
        answer: correctAnswer.value.toUpperCase(),
        explanation: newExplanation.value
    };

    questions.push(questionObj);
    saveQuestions();

    importMessage.textContent =
        "Question added! Total questions: " + questions.length;

    newQuestion.value = "";
    choiceA.value = "";
    choiceB.value = "";
    choiceC.value = "";
    choiceD.value = "";
    correctAnswer.value = "";
    newExplanation.value = "";
};

        showHome();
    </script>
</body>
</html>
